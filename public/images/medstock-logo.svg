<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="futuristicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Futuristic hexagon background -->
  <polygon points="22,8 38,16 38,32 22,40 6,32 6,16" fill="url(#futuristicGrad)" opacity="0.9"/>
  
  <!-- Glowing center circle -->
  <circle cx="22" cy="24" r="6" fill="#FF4444" opacity="0.3" filter="blur(2px)"/>
  
  <!-- Tech-style plus symbol -->
  <rect x="19" y="16" width="6" height="16" fill="#FFFFFF"/>
  <rect x="13" y="22" width="18" height="4" fill="#FFFFFF"/>
  
  <!-- Accent lines (tech border) -->
  <line x1="10" y1="15" x2="10" y2="33" stroke="#FF4444" stroke-width="1" opacity="0.6"/>
  <line x1="34" y1="15" x2="34" y2="33" stroke="#FF4444" stroke-width="1" opacity="0.6"/>
  
  <!-- MedStock text - futuristic style -->
  <text x="48" y="33" font-family="'Orbitron', 'Courier New', monospace" font-size="26" font-weight="800" fill="#8B0000" letter-spacing="1">Med</text>
  <text x="98" y="33" font-family="'Orbitron', 'Courier New', monospace" font-size="26" font-weight="600" fill="#FF4444" letter-spacing="1">Stock</text>
</svg>
